# Definições de Memória para evitar "JVM garbage collector is thrashing"
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Suporte AndroidX
android.useAndroidX=true
android.enableJetifier=true

# CORRECÇÃO: Desativa compilação incremental para evitar erro de raízes diferentes (C: vs D:)
kotlin.incremental=false
kotlin.incremental.multiplatform=false
kotlin.incremental.js=false

# Otimização de build em Windows
org.gradle.vfs.watch=false
